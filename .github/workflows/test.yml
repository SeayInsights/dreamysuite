name: CI

# Pre-merge gate. deploy.yml only runs on push to main (post-merge), so without
# this a red suite or type/lint/build break could land on main and auto-deploy.
on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: nextjs-${{ runner.os }}-

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      # Unit tests + coverage floor (see vitest.config.ts thresholds).
      - run: npx vitest run --coverage

      # Catch build/type regressions before merge (deploy.yml builds post-merge).
      - run: npm run build

# NOTE: e2e (Playwright) is intentionally not gated here yet. The e2e specs live
# under /e2e which is currently gitignored, and a working authenticated run needs
# a seeded, email-verified test user (better-auth requireEmailVerification). Both
# are tracked as follow-up before e2e can be wired into CI.
