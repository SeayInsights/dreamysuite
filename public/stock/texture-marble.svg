<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Soft white marble with grey veining">
  <defs>
    <filter id="tm-veins" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.012" numOctaves="4" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.62  0 0 0 0 0.63  0 0 0 0 0.66  0 0 0 0.9 0" result="veins"/>
      <feComponentTransfer in="veins" result="veinsSharp">
        <feFuncA type="gamma" amplitude="1" exponent="6" offset="0"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="veinsSharp"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#f4f2ee"/>
  <rect width="1600" height="1000" fill="#f4f2ee" filter="url(#tm-veins)" opacity="0.85"/>
</svg>
