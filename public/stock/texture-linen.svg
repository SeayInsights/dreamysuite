<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Warm woven linen texture">
  <defs>
    <pattern id="tl-weave" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#efe9dd"/>
      <rect width="6" height="12" fill="#e7dfce" opacity="0.6"/>
      <rect width="12" height="6" fill="#f4efe4" opacity="0.5"/>
    </pattern>
    <filter id="tl-soft"><feGaussianBlur stdDeviation="0.4"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="#ece5d6"/>
  <rect width="1600" height="1000" fill="url(#tl-weave)" filter="url(#tl-soft)" opacity="0.9"/>
</svg>
