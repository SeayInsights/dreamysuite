<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Soft blush and gold light bloom">
  <defs>
    <radialGradient id="rb-glow" cx="30%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#fff6f0"/>
      <stop offset="45%" stop-color="#fce4e0"/>
      <stop offset="100%" stop-color="#f3c9cf"/>
    </radialGradient>
    <radialGradient id="rb-bloom" cx="72%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#f7d9b5" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f7d9b5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#rb-glow)"/>
  <rect width="1600" height="1000" fill="url(#rb-bloom)"/>
  <circle cx="480" cy="300" r="360" fill="#ffffff" opacity="0.18"/>
</svg>
