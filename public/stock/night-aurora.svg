      <stop offset="0%" stop-color="#0a1028"/>
      <stop offset="60%" stop-color="#111a3a"/>
      <stop offset="100%" stop-color="#0b1230"/>
    </linearGradient>
    <linearGradient id="na-aur" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2fd3b3" stop-opacity="0"/>
      <stop offset="45%" stop-color="#39d6b0" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#8a6be6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8a6be6" stop-opacity="0"/>
