<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Sage eucalyptus sprigs on cream">
  <defs>
    <linearGradient id="be-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f4ea"/>
      <stop offset="100%" stop-color="#eae4d3"/>
    </linearGradient>
    <g id="be-sprig" stroke="#8a9a7b" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.55">
      <path d="M0 90 C 40 70, 90 60, 150 55"/>
      <g fill="#9aab88" stroke="none" opacity="0.9">
        <ellipse cx="34" cy="70" rx="15" ry="9" transform="rotate(-28 34 70)"/>
        <ellipse cx="66" cy="60" rx="16" ry="9" transform="rotate(-20 66 60)"/>
        <ellipse cx="100" cy="55" rx="16" ry="9" transform="rotate(-12 100 55)"/>
        <ellipse cx="134" cy="53" rx="14" ry="8" transform="rotate(-6 134 53)"/>
        <ellipse cx="50" cy="84" rx="15" ry="9" transform="rotate(24 50 84)"/>
        <ellipse cx="84" cy="76" rx="16" ry="9" transform="rotate(18 84 76)"/>
        <ellipse cx="118" cy="70" rx="15" ry="8" transform="rotate(12 118 70)"/>
      </g>
    </g>
    <pattern id="be-pat" width="360" height="300" patternUnits="userSpaceOnUse" patternTransform="rotate(-8)">
      <use href="#be-sprig" x="20" y="40"/>
      <use href="#be-sprig" x="200" y="180" transform="scale(-1,1) translate(-560,0)"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#be-bg)"/>
  <rect width="1600" height="1000" fill="url(#be-pat)"/>
</svg>
