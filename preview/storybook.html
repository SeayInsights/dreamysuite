<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Preview — Storybook Animation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;overflow:hidden;font-family:Georgia,serif;}
:root{--heading-font:Georgia,serif;}

.intro-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:transparent;cursor:pointer;overflow:hidden;}
.intro-book{background:#1e120a;perspective:2600px;perspective-origin:60% 50%;}
.book-page-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,#fff8ee 0%,#f0e0c0 45%,#ddc898 100%);}
.book-cover{position:absolute;inset:0;z-index:9;transform-origin:right center;transform-style:preserve-3d;will-change:transform;}
.book-cover-face{position:absolute;inset:0;backface-visibility:hidden;background:repeating-linear-gradient(45deg,transparent,transparent 1px,rgba(0,0,0,0.03) 1px,rgba(0,0,0,0.03) 2px),repeating-linear-gradient(-45deg,transparent,transparent 1px,rgba(255,255,255,0.012) 1px,rgba(255,255,255,0.012) 2px),linear-gradient(160deg,#1c0e08 0%,#2e1a0e 18%,#3d2412 50%,#2a1808 82%,#180c06 100%);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.book-cover-face::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(91deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 3px),repeating-linear-gradient(1deg,transparent,transparent 9px,rgba(255,255,255,0.008) 9px,rgba(255,255,255,0.008) 10px);}
.book-cover-face::after{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(7deg,transparent 22%,rgba(0,0,0,0.045) 22.4%,transparent 22.8%),linear-gradient(-4deg,transparent 57%,rgba(0,0,0,0.03) 57.3%,transparent 57.7%),linear-gradient(11deg,transparent 70%,rgba(0,0,0,0.025) 70.3%,transparent 70.7%);}
.book-ornate-border{position:absolute;inset:clamp(12px,2.5vw,40px);border:1px solid rgba(212,175,55,0.65);}
.book-ornate-border::before{content:'';position:absolute;inset:9px;border:1px solid rgba(212,175,55,0.28);}
.book-ornate-border::after{content:'';position:absolute;inset:17px;border:1px solid rgba(212,175,55,0.12);}
.book-inner-frame{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(0.45rem,1.8vh,1.3rem);padding:clamp(1.2rem,5vw,5rem);text-align:center;}
.book-ornament-top{color:rgba(212,175,55,0.52);font-size:clamp(0.62rem,1.4vw,0.95rem);letter-spacing:0.52em;}
.book-rule{width:clamp(60px,20vw,260px);height:1px;background:linear-gradient(to right,transparent,rgba(212,175,55,0.55),rgba(212,175,55,0.75),rgba(212,175,55,0.55),transparent);}
.book-cover-title{font-family:var(--heading-font);font-size:clamp(1.7rem,5.5vw,4.8rem);font-weight:normal;color:rgba(255,245,210,0.93);letter-spacing:0.07em;line-height:1.2;text-shadow:0 0 70px rgba(212,175,55,0.22),0 2px 10px rgba(0,0,0,0.75);}
.book-cover-date{font-size:clamp(0.78rem,1.8vw,1.2rem);color:rgba(212,175,55,0.62);font-style:italic;letter-spacing:0.14em;}
.book-ornament-btm{color:rgba(212,175,55,0.48);font-size:clamp(1rem,2.5vw,2rem);}
.book-cover-back{position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);background:linear-gradient(to left,#f0e4cc 0%,#ecdcbe 40%,#e2d0aa 100%);}
.book-spine{position:absolute;right:0;top:0;bottom:0;width:clamp(18px,2vw,38px);background:linear-gradient(to right,#0e0706,#1c1008,#0e0706);box-shadow:-8px 0 28px rgba(0,0,0,0.65),inset -3px 0 10px rgba(255,255,255,0.03);z-index:12;pointer-events:none;}
.book-cue{position:absolute;bottom:clamp(1.2rem,3vh,2.5rem);left:0;right:0;text-align:center;font-style:italic;color:rgba(212,175,55,0.42);font-size:0.82rem;letter-spacing:0.16em;pointer-events:none;z-index:20;}
.book-page-1,.book-page-2,.book-page-3{position:absolute;inset:0;transform-origin:right center;transform-style:preserve-3d;will-change:transform;backface-visibility:hidden;}
.book-page-1{background:linear-gradient(160deg,#fdf8f0 0%,#f5e8d0 55%,#ecdcc0 100%);z-index:8;}
.book-page-1::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(0,0,0,0.028) 18px,rgba(0,0,0,0.028) 19px);pointer-events:none;}
.book-page-1::after{content:'';position:absolute;inset:0;transform:rotateY(180deg);backface-visibility:hidden;background:linear-gradient(160deg,#f0e4cc 0%,#e6d4b0 55%,#d8c090 100%);box-shadow:inset 4px 0 18px rgba(0,0,0,0.14);}
.book-page-2{background:linear-gradient(160deg,#fef9f2 0%,#f7ece0 55%,#eedec8 100%);z-index:7;}
.book-page-2::after{content:'';position:absolute;inset:0;transform:rotateY(180deg);backface-visibility:hidden;background:linear-gradient(160deg,#f2e6d0 0%,#e8d8b8 55%,#dacc98 100%);box-shadow:inset 4px 0 18px rgba(0,0,0,0.12);}
.book-page-3{background:linear-gradient(160deg,#fdf7ed 0%,#f3e5cc 55%,#e8d5b0 100%);z-index:6;}
.book-page-3::after{content:'';position:absolute;inset:0;transform:rotateY(180deg);backface-visibility:hidden;background:linear-gradient(160deg,#f0e2c8 0%,#e4d0a8 55%,#d4bc88 100%);box-shadow:inset 4px 0 18px rgba(0,0,0,0.11);}
.book-final-page{position:absolute;inset:0;z-index:4;overflow:hidden;opacity:0;}
.book-final-page-parchment{background:radial-gradient(ellipse at 40% 40%,#fdf6e3 0%,#f0e0b0 60%,#dcc890 100%);}
.book-final-page-parchment::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,transparent 52%,rgba(10,5,0,0.55) 100%);}
@keyframes rose-petal-fall{0%{transform:translateY(-6vh) translateX(0) rotate(0deg);opacity:0;}8%{opacity:0.42;}92%{opacity:0.3;}100%{transform:translateY(108vh) translateX(var(--drift,28px)) rotate(var(--rot,255deg));opacity:0;}}
.book-petal{position:absolute;top:-4%;left:var(--left,40%);width:9px;height:7px;border-radius:60% 40% 60% 40%;background:radial-gradient(ellipse,rgba(220,148,118,0.62) 0%,rgba(195,95,85,0.32) 100%);pointer-events:none;z-index:2;opacity:0;animation:rose-petal-fall var(--dur,10s) var(--delay,0s) ease-in infinite;}
@keyframes sparkle-glint{0%,100%{transform:scale(0) rotate(0deg);opacity:0;}40%,60%{transform:scale(1) rotate(15deg);opacity:0.72;}}
.book-sparkle{position:absolute;width:6px;height:6px;border-radius:50%;background:radial-gradient(circle,rgba(255,240,178,0.9) 0%,transparent 100%);pointer-events:none;z-index:3;opacity:0;animation:sparkle-glint var(--dur,5s) var(--delay,0s) ease-in-out infinite;}
.book-sparkle::before,.book-sparkle::after{content:'';position:absolute;background:rgba(255,238,172,0.72);border-radius:2px;}
.book-sparkle::before{width:1px;height:14px;top:-4px;left:2.5px;}.book-sparkle::after{width:14px;height:1px;top:2.5px;left:-4px;}
@keyframes grain-shift{0%,100%{background-position:0% 0%;}25%{background-position:18% 9%;}50%{background-position:-14% 22%;}75%{background-position:9% -12%;}}
.intro-grain{position:absolute;inset:0;z-index:90;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px;animation:grain-shift 0.14s steps(1) infinite;mix-blend-mode:overlay;opacity:0.05;}
.intro-vignette{position:absolute;inset:0;z-index:89;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 42%,rgba(0,0,0,0.78) 100%);}
.replay-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;background:rgba(18,10,3,0.85);color:rgba(255,215,120,0.9);border:1px solid rgba(255,195,70,0.25);border-radius:999px;padding:0.45rem 1.2rem;font-size:0.78rem;letter-spacing:0.15em;cursor:pointer;font-family:Georgia,serif;font-style:italic;backdrop-filter:blur(8px);}
</style>
</head>
<body>
<div id="intro-overlay" class="intro-overlay intro-book">
  <div class="book-page-bg"></div>
  <div class="book-final-page book-final-page-parchment">
    <div class="book-petal" style="--left:18%;--dur:9s;--delay:0.8s;--drift:25px;--rot:240deg;"></div>
    <div class="book-petal" style="--left:42%;--dur:11s;--delay:2.4s;--drift:-30px;--rot:310deg;"></div>
    <div class="book-petal" style="--left:67%;--dur:8.5s;--delay:1.1s;--drift:20px;--rot:180deg;"></div>
    <div class="book-petal" style="--left:31%;--dur:12s;--delay:4.2s;--drift:-22px;--rot:290deg;"></div>
    <div class="book-sparkle" style="top:15%;left:12%;--dur:5s;--delay:0s;"></div>
    <div class="book-sparkle" style="top:20%;right:14%;left:auto;--dur:4.5s;--delay:2.1s;"></div>
  </div>
  <div class="book-page-3"></div>
  <div class="book-page-2"></div>
  <div class="book-page-1"></div>
  <div class="book-cover">
    <div class="book-cover-face">
      <div class="book-ornate-border">
        <div class="book-inner-frame">
          <div class="book-ornament-top">✦ · ✦ · ✦</div>
          <div class="book-rule"></div>
          <p class="book-cover-title">Emma &amp; James</p>
          <p class="book-cover-date">June 14, 2025</p>
          <div class="book-rule"></div>
          <div class="book-ornament-btm">❦</div>
        </div>
      </div>
    </div>
    <div class="book-cover-back"></div>
  </div>
  <div class="book-spine"></div>
  <p class="book-cue">— tap to open —</p>
  <div class="intro-vignette"></div>
  <div class="intro-grain"></div>
</div>
<button class="replay-btn" id="replay-btn" style="display:none" onclick="replay()">↺ replay</button>
<script>
var el = document.getElementById('intro-overlay');
var opened = false;

function play() {
  if (opened) return;
  opened = true;
  gsap.set(['.book-page-1','.book-page-2','.book-page-3'], { rotateY:0, transformOrigin:'right center' });
  gsap.set('.book-final-page', { opacity:0 });
  var tl = gsap.timeline({ onComplete: done });
  tl
    .to('.book-cue',       { opacity:0, duration:0.25 }, 0)
    .to('.book-cover',     { rotateY:-60,  duration:0.8,  ease:'power2.inOut', transformOrigin:'right center' }, 0.1)
    .to('.book-page-1',    { rotateY:-160, duration:0.6,  ease:'power3.inOut', transformOrigin:'right center' }, 0.85)
    .to('.book-page-2',    { rotateY:-160, duration:0.58, ease:'power3.inOut', transformOrigin:'right center' }, 1.4)
    .to('.book-page-3',    { rotateY:-160, duration:0.55, ease:'power3.inOut', transformOrigin:'right center' }, 1.88)
    .to('.book-cover',     { rotateY:-162, duration:1.1,  ease:'power4.inOut', transformOrigin:'right center' }, 1.62)
    .to('.book-final-page',{ opacity:1, duration:0.85, ease:'power1.inOut' }, 2.42)
    .to('.book-page-bg',   { filter:'brightness(1.12)', duration:0.65, ease:'power1.inOut' }, 2.52)
    .to(el,                { opacity:0, duration:0.72, ease:'power2.in' }, '-=0.45');
}

function done() {
  el.style.display = 'none';
  document.getElementById('replay-btn').style.display = 'block';
}

function replay() {
  el.style.display = '';
  gsap.killTweensOf('*');
  gsap.set(el, { opacity:1 });
  gsap.set('.book-cover',  { rotateY:0, transformOrigin:'right center' });
  gsap.set(['.book-page-1','.book-page-2','.book-page-3'], { rotateY:0, opacity:1 });
  gsap.set('.book-final-page', { opacity:0 });
  gsap.set('.book-page-bg', { filter:'none' });
  gsap.set('.book-cue', { opacity:1 });
  document.getElementById('replay-btn').style.display = 'none';
  opened = false;
  el.addEventListener('click', play, { once:true });
}

el.addEventListener('click', play, { once:true });
</script>
</body>
</html>
