<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Preview — Envelope Animation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;overflow:hidden;font-family:Georgia,serif;}
:root{--env-color:#f2e8d8;--card-color:#fffaf4;--heading-font:Georgia,serif;}

@keyframes envfs-seal-pulse{0%,100%{box-shadow:0 4px 18px rgba(0,0,0,0.55);}50%{box-shadow:0 4px 18px rgba(0,0,0,0.55),0 0 32px 12px rgba(255,200,110,0.32);}}
.intro-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:transparent;cursor:pointer;overflow:hidden;}
.intro-env-fs{perspective:1600px;background:radial-gradient(ellipse at 50% 38%,#1e0e06 0%,#0a0402 100%);}
.envfs-body{position:absolute;inset:0;background:var(--env-color);overflow:hidden;}
.envfs-left-fold{position:absolute;top:0;left:0;bottom:0;width:62%;background:linear-gradient(to right,color-mix(in srgb,var(--env-color) 72%,#6b4c2a) 0%,transparent 100%);clip-path:polygon(0 0,100% 50%,0 100%);}
.envfs-right-fold{position:absolute;top:0;right:0;bottom:0;width:62%;background:linear-gradient(to left,color-mix(in srgb,var(--env-color) 72%,#6b4c2a) 0%,transparent 100%);clip-path:polygon(100% 0,0 50%,100% 100%);}
.envfs-bottom-fold{position:absolute;bottom:0;left:0;right:0;height:56%;background:linear-gradient(to top,color-mix(in srgb,var(--env-color) 83%,#6b4c2a) 0%,transparent 100%);clip-path:polygon(0 100%,50% 0,100% 100%);}
.envfs-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 42%,rgba(255,215,140,0.78) 0%,rgba(255,175,65,0.38) 38%,transparent 66%);opacity:0;z-index:4;pointer-events:none;}
.envfs-card{position:absolute;left:50%;top:50%;width:min(400px,72vw);padding:clamp(1.75rem,4vw,2.75rem) clamp(1.5rem,3vw,2.25rem);background:var(--card-color);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:30;box-shadow:0 18px 80px rgba(0,0,0,0.6),0 4px 16px rgba(0,0,0,0.35);pointer-events:none;opacity:0;}
.envfs-card::before,.envfs-card::after{content:'';display:block;width:72%;height:1px;background:linear-gradient(to right,transparent,rgba(0,0,0,0.18),transparent);}
.envfs-card::before{margin-bottom:1rem;}.envfs-card::after{margin-top:1rem;}
.envfs-card-ornament{font-size:1.2rem;opacity:0.3;margin-bottom:0.7rem;letter-spacing:0.35em;}
.envfs-card-name{font-family:var(--heading-font);font-size:clamp(1.25rem,4vw,2rem);font-weight:normal;color:#1c1008;margin-bottom:0.5rem;line-height:1.2;}
.envfs-card-date{font-size:clamp(0.75rem,1.8vw,0.95rem);color:#78716c;font-style:italic;}
.envfs-flap{position:absolute;top:0;left:0;right:0;height:58vh;background:linear-gradient(168deg,var(--env-color) 28%,color-mix(in srgb,var(--env-color) 80%,#5a3820) 100%);clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;transform-style:preserve-3d;z-index:20;will-change:transform;}
.envfs-flap::after{content:'';position:absolute;inset:0;clip-path:polygon(0 0,100% 0,50% 100%);background:linear-gradient(168deg,color-mix(in srgb,var(--env-color) 55%,#3d2210) 0%,color-mix(in srgb,var(--env-color) 40%,#3d2210) 100%);transform:rotateX(180deg);backface-visibility:visible;}
.envfs-seal{position:absolute;top:78%;left:50%;transform:translate(-50%,-50%);width:clamp(70px,9vw,110px);height:clamp(70px,9vw,110px);border-radius:50%;background:radial-gradient(circle at 28% 22%,rgba(255,248,200,0.72) 0%,transparent 34%),radial-gradient(circle at 68% 72%,rgba(140,80,0,0.35) 0%,transparent 38%),radial-gradient(circle at 50% 50%,#d4a843 0%,color-mix(in srgb,#d4a843 72%,#5a3000) 45%,color-mix(in srgb,#d4a843 48%,#2a1000) 80%,color-mix(in srgb,#d4a843 30%,#000) 100%);box-shadow:0 8px 36px rgba(0,0,0,0.62),0 2px 10px rgba(0,0,0,0.38),inset 0 4px 7px rgba(255,248,180,0.38),inset 0 -5px 9px rgba(80,40,0,0.5),inset 0 0 18px rgba(0,0,0,0.18);display:flex;align-items:center;justify-content:center;z-index:25;pointer-events:none;overflow:hidden;animation:envfs-seal-pulse 2.4s ease-in-out infinite;}
.envfs-seal::before{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid rgba(200,140,10,0.42);box-shadow:inset 0 0 0 5px rgba(180,110,0,0.11),inset 0 0 0 9px rgba(150,90,0,0.07),0 0 0 3px rgba(160,100,0,0.10),inset 0 0 8px rgba(255,220,100,0.18),inset 0 2px 4px rgba(0,0,0,0.22);pointer-events:none;}
.envfs-seal::after{content:'';position:absolute;inset:14%;border-radius:50%;border:1px solid rgba(255,235,145,0.28);pointer-events:none;}
.envfs-seal-rose{position:absolute;inset:10%;pointer-events:none;opacity:0.28;width:80%;height:80%;}
.envfs-seal-specular{position:absolute;width:38%;height:38%;top:14%;left:18%;border-radius:50%;pointer-events:none;z-index:2;background:radial-gradient(circle,rgba(255,252,215,0.82) 0%,rgba(255,248,200,0.35) 45%,transparent 75%);filter:blur(3px);}
.envfs-seal-noise{position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:3;opacity:0.062;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='waxn'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23waxn)'/%3E%3C/svg%3E");background-size:100px 100px;}
.envfs-seal-text{font-family:var(--heading-font);font-size:clamp(1.7rem,5.2vw,3rem);font-style:italic;font-weight:normal;letter-spacing:-0.02em;line-height:1;text-align:center;position:relative;z-index:1;color:rgba(70,38,0,0.82);text-shadow:0 1px 1px rgba(255,235,155,0.55),0 -1px 2px rgba(0,0,0,0.38),0 2px 7px rgba(80,40,0,0.5);}
.envfs-cue{position:absolute;bottom:clamp(1.5rem,4vh,2.5rem);left:50%;transform:translateX(-50%);font-style:italic;color:rgba(255,255,255,0.5);font-size:clamp(0.72rem,1.5vw,0.88rem);letter-spacing:0.12em;white-space:nowrap;z-index:35;pointer-events:none;}
.envfs-opener{position:absolute;top:44vh;left:50%;transform:translate(-80px,-50%);width:52px;height:3px;background:linear-gradient(to right,rgba(8,4,1,0.95),rgba(28,14,4,0.72));border-radius:0 2px 2px 0;z-index:26;pointer-events:none;opacity:0;box-shadow:0 1px 5px rgba(0,0,0,0.65);}
@keyframes envfs-shimmer-move{0%{opacity:0;background-position:130% 0;}14%{opacity:1;}86%{opacity:1;}100%{opacity:0;background-position:-130% 0;}}
.envfs-shimmer{position:absolute;inset:0;z-index:5;pointer-events:none;background:linear-gradient(108deg,transparent 25%,rgba(255,242,205,0.065) 50%,transparent 75%);background-size:260% 100%;opacity:0;animation:envfs-shimmer-move 3.4s ease-in-out 2.4s 1 forwards;}
.envfs-light-sweep{position:absolute;inset:0;z-index:6;pointer-events:none;background:linear-gradient(128deg,transparent 18%,rgba(255,248,205,0.055) 46%,rgba(255,244,195,0.038) 52%,transparent 78%);background-size:260% 260%;background-position:160% 160%;opacity:0;mix-blend-mode:screen;}
.envfs-flap-noise{position:absolute;inset:0;pointer-events:none;clip-path:polygon(0 0,100% 0,50% 100%);opacity:0.042;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='flapn'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23flapn)'/%3E%3C/svg%3E");background-size:180px 180px;}
@keyframes grain-shift{0%,100%{background-position:0% 0%;}25%{background-position:18% 9%;}50%{background-position:-14% 22%;}75%{background-position:9% -12%;}}
.intro-grain{position:absolute;inset:0;z-index:90;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px;animation:grain-shift 0.14s steps(1) infinite;mix-blend-mode:overlay;opacity:0.05;}
.intro-lbox{position:absolute;left:0;right:0;z-index:88;pointer-events:none;background:#000;}
.intro-lbox-t{top:0;height:48px;}.intro-lbox-b{bottom:0;height:48px;}
.intro-vignette{position:absolute;inset:0;z-index:89;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 42%,rgba(0,0,0,0.78) 100%);}
@keyframes dust-rise{0%{transform:translateY(0) translateX(0);opacity:0;}12%{opacity:1;}88%{opacity:0.55;}100%{transform:translateY(-65vh) translateX(var(--dx,18px));opacity:0;}}
.intro-dust{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden;}
.dust-mote{position:absolute;border-radius:50%;width:var(--sz,2px);height:var(--sz,2px);background:rgba(255,218,130,var(--op,0.55));bottom:var(--by,20%);left:var(--bx,50%);animation:dust-rise var(--dur,10s) var(--delay,0s) ease-in-out infinite;}
.replay-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;background:rgba(18,10,3,0.85);color:rgba(255,215,120,0.9);border:1px solid rgba(255,195,70,0.25);border-radius:999px;padding:0.45rem 1.2rem;font-size:0.78rem;letter-spacing:0.15em;cursor:pointer;font-family:Georgia,serif;font-style:italic;backdrop-filter:blur(8px);}
</style>
</head>
<body>
<div id="intro-overlay" class="intro-overlay intro-env-fs">
  <div class="envfs-body">
    <div class="envfs-left-fold"></div>
    <div class="envfs-right-fold"></div>
    <div class="envfs-bottom-fold"></div>
    <div class="envfs-glow"></div>
    <div class="intro-dust">
      <div class="dust-mote" style="--sz:2px;--by:14%;--bx:27%;--dur:11s;--delay:0.4s;--dx:-28px;--op:0.5"></div>
      <div class="dust-mote" style="--sz:3px;--by:21%;--bx:64%;--dur:9s;--delay:2.0s;--dx:22px;--op:0.6"></div>
      <div class="dust-mote" style="--sz:2px;--by:9%;--bx:44%;--dur:13s;--delay:0.9s;--dx:34px;--op:0.4"></div>
      <div class="dust-mote" style="--sz:3px;--by:33%;--bx:79%;--dur:8s;--delay:3.4s;--dx:-24px;--op:0.55"></div>
    </div>
    <div class="envfs-card">
      <div class="envfs-card-ornament">✶ · ✶</div>
      <p class="envfs-card-name">Emma &amp; James</p>
      <p class="envfs-card-date">June 14, 2025</p>
    </div>
  </div>
  <div class="envfs-flap">
    <div class="envfs-flap-noise"></div>
    <div class="envfs-seal">
      <div class="envfs-seal-specular"></div>
      <svg class="envfs-seal-rose" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20 19C20 14.5 24.5 12 25 17C25.5 22 21 23.5 20 19Z" stroke="rgba(255,228,140,0.9)" stroke-width="0.55"/>
        <path d="M20 19C15.5 19 13 14.5 18 14C23 13.5 24.5 18 20 19Z" stroke="rgba(255,228,140,0.9)" stroke-width="0.55"/>
        <path d="M20 19C20 23.5 15.5 26 15 21C14.5 16 19 14.5 20 19Z" stroke="rgba(255,228,140,0.9)" stroke-width="0.55"/>
        <path d="M20 19C24.5 19 27 23.5 22 24C17 24.5 15.5 20 20 19Z" stroke="rgba(255,228,140,0.9)" stroke-width="0.55"/>
        <circle cx="20" cy="19" r="1.8" stroke="rgba(255,228,140,0.7)" stroke-width="0.5"/>
      </svg>
      <div class="envfs-seal-noise"></div>
      <span class="envfs-seal-text">E · J</span>
    </div>
  </div>
  <p class="envfs-cue">— click to open —</p>
  <div class="envfs-shimmer"></div>
  <div class="envfs-light-sweep"></div>
  <div class="envfs-opener"></div>
  <div class="intro-lbox intro-lbox-t" id="intro-lbox-t"></div>
  <div class="intro-lbox intro-lbox-b" id="intro-lbox-b"></div>
  <div class="intro-vignette"></div>
  <div class="intro-grain"></div>
</div>
<button class="replay-btn" id="replay-btn" style="display:none" onclick="replay()">↺ replay</button>
<script>
var el = document.getElementById('intro-overlay');
var opened = false;

function play() {
  if (opened) return;
  opened = true;
  var seal = document.querySelector('.envfs-seal');
  if (seal) seal.style.animation = 'none';
  gsap.set('.envfs-card',          { xPercent:-50, yPercent:-50, y:'100vh', opacity:0, filter:'blur(12px)' });
  gsap.set('#intro-lbox-t',        { height:48 });
  gsap.set('#intro-lbox-b',        { height:48 });
  gsap.set('.envfs-opener',        { opacity:0, x:-80 });
  gsap.set('.envfs-seal-specular', { x:0, y:0, opacity:1 });
  gsap.set('.envfs-light-sweep',   { opacity:0, backgroundPosition:'160% 160%' });
  CustomEase.create('flapHeavy','M0,0 C0.018,0 0.038,0.055 0.09,0.15 0.21,0.44 0.5,0.82 0.68,0.94 0.8,1.01 0.92,1.0 1,1');
  var tl = gsap.timeline({ onComplete: done });
  tl
    .to('.envfs-cue',          { opacity:0, duration:0.3 }, 0)
    .to('.envfs-opener',       { x:0, opacity:1, duration:0.38, ease:'power4.out' }, 0)
    .to('.envfs-seal-specular',{ x:12, y:7, opacity:0.55, duration:0.8, ease:'power2.out' }, 0.38)
    .to('.envfs-seal',         { y:'-14%', rotateX:-28, scale:1.04, duration:0.72, ease:'power4.out', transformPerspective:700 }, 0.38)
    .to('.envfs-seal',         { y:'-130%', rotateX:55, opacity:0, duration:1.0, ease:'expo.out' }, 1.14)
    .to('.envfs-opener',       { opacity:0, duration:0.35 }, 1.42)
    .to(['#intro-lbox-t','#intro-lbox-b'], { height:0, duration:1.25, ease:'power4.inOut' }, 1.4)
    .to('.envfs-flap',         { rotateX:-200, duration:2.2, ease:'flapHeavy', transformOrigin:'top center' }, 1.62)
    .to('.envfs-light-sweep',  { opacity:1, backgroundPosition:'-20% -20%', duration:2.4, ease:'power2.inOut' }, 1.62)
    .to('.envfs-light-sweep',  { opacity:0, duration:0.9, ease:'power1.in' }, 3.65)
    .to('.envfs-glow',         { opacity:1, duration:1.8, ease:'power1.in' }, 2.42)
    .to('.envfs-card',         { y:0, opacity:1, duration:2.0, ease:'power3.out' }, 3.82)
    .to('.envfs-card',         { filter:'blur(0px)', duration:1.55, ease:'expo.out' }, 3.82)
    .to('.envfs-card',         { scale:1.02, duration:0.6, ease:'sine.inOut' }, 5.82)
    .to('.envfs-card',         { scale:1.0,  duration:0.6, ease:'sine.inOut' }, 6.42)
    .to({},                    { duration:1.5 })
    .to(el,                    { opacity:0, duration:0.95, ease:'power2.in' });
}

function done() {
  el.style.display = 'none';
  document.getElementById('replay-btn').style.display = 'block';
}

function replay() {
  el.style.display = '';
  gsap.killTweensOf('*');
  gsap.set(el, { opacity:1 });
  gsap.set('.envfs-card',          { xPercent:-50, yPercent:-50, y:'100vh', opacity:0, scale:1, filter:'blur(12px)' });
  gsap.set('.envfs-flap',          { rotateX:0 });
  gsap.set('.envfs-glow',          { opacity:0 });
  gsap.set('.envfs-seal',          { y:0, opacity:1, scale:1, rotateX:0 });
  gsap.set('.envfs-seal-specular', { x:0, y:0, opacity:1 });
  gsap.set('.envfs-light-sweep',   { opacity:0, backgroundPosition:'160% 160%' });
  gsap.set('.envfs-cue',           { opacity:1 });
  gsap.set('.envfs-opener',        { opacity:0, x:-80 });
  gsap.set('#intro-lbox-t',        { height:48 });
  gsap.set('#intro-lbox-b',        { height:48 });
  var s = document.querySelector('.envfs-seal');
  if (s) s.style.animation = 'envfs-seal-pulse 2.4s ease-in-out infinite';
  document.getElementById('replay-btn').style.display = 'none';
  opened = false;
  el.addEventListener('click', play, { once:true });
}

// Entrance drift-in
gsap.set('.envfs-card',   { xPercent:-50, yPercent:-50, y:'100vh', opacity:0, filter:'blur(12px)' });
gsap.set('.envfs-opener', { opacity:0, x:-80 });
gsap.set('.intro-env-fs', { scale:0.93, y:20, opacity:0 });
gsap.set('#intro-lbox-t', { height:0 });
gsap.set('#intro-lbox-b', { height:0 });
gsap.timeline()
  .to('.intro-env-fs', { scale:1, y:0, opacity:1, duration:1.85, ease:'power2.out' })
  .to(['#intro-lbox-t','#intro-lbox-b'], { height:48, duration:1.0, ease:'power2.out' }, 0.55);

el.addEventListener('click', play, { once:true });
</script>
</body>
</html>
